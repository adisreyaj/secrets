<div class="min-h-screen">
  <header class="sticky top-0 z-20 border-b border-border/70 bg-bg/80 backdrop-blur">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-4">
      <div class="flex items-center gap-4">
        <div class="flex h-10 w-10 items-center justify-center rounded-2xl bg-primary/20 text-primary">
          <span class="text-lg font-bold">S</span>
        </div>
        <div>
          <p class="text-xs uppercase tracking-[0.3em] text-muted">Secrets</p>
          <p class="text-lg font-semibold">Vault Manager</p>
        </div>
      </div>

      <nav class="hidden items-center gap-4 md:flex">
        <a class="text-sm text-muted hover:text-text" routerLink="/projects">Projects</a>
        <a class="text-sm text-muted hover:text-text" routerLink="/login">Sign in</a>
      </nav>

      <div class="flex items-center gap-3">
        @if (isSignedIn()) {
          <div class="text-right">
            <p class="text-sm font-semibold">{{ displayName() }}</p>
            <p class="text-xs text-muted">Signed in</p>
          </div>
          <button class="btn-ghost" (click)="logout()">Logout</button>
        } @else {
          <a class="btn-primary" routerLink="/login">Get started</a>
        }
      </div>
    </div>
  </header>

  <main class="mx-auto flex max-w-6xl flex-col gap-10 px-6 py-10">
    <router-outlet></router-outlet>
  </main>
</div>
